<html>
<head>
<style>
body{
    background:#f0f0f0;
    font-family:Arial;
}
.container{
    width:900px;
    height:500px;
    margin:50px auto;
    background:white;
    display:flex;
}
.left{
    width:35%;
    background:#2874f0;
    color:white;
    padding:40px;
}
.right{
    width:65%;
    padding:50px;
}
input{
    width:100%;
    border:none;
    border-bottom:2px solid #2874f0;
    padding:10px;
    font-size:16px;
}
button{
    width:100%;
    background:orange;
    color:white;
    border:none;
    padding:12px;
    margin-top:20px;
    font-size:18px;
}
.bottom{
    text-align:center;
    margin-top:150px;
    color:#2874f0;
}
</style>
</head>
<body>
<div class="container">
    <div class="left">
        <h1>Login</h1>
        <p>
            Get access to your Orders,<br>
            Wishlist and Recommendations
        </p>
    </div>
    <div class="right">
        <input type="text"
        placeholder="Enter Email/Mobile Number">
        <br><br>
        <p>
            By continuing, you agree to
            Terms of Use and Privacy Policy.
        </p>
        <button>Request OTP</button>
        <div class="bottom">
            New to Flipkart? Create an account
        </div>
    </div>
</div>
</body>
</html>
