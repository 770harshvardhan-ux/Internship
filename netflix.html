<!DOCTYPE html>
<html>
<head>
    <title>Netflix Clone</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body{
            background:url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1200")
            center/cover;
            height:100vh;
        }
        .overlay{
            background:rgba(0,0,0,0.7);
            height:100vh;
        }
        .navbar{
            display:flex;
            justify-content:space-between;
            padding:20px 80px;
        }
        .logo{
            color:red;
            font-size:40px;
            font-weight:bold;
        }
        .signin{
            background:red;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
        }
        .content{
            color:white;
            text-align:center;
            margin-top:150px;
        }
        .content h1{
            font-size:60px;
        }
        .content h3{
            margin:20px;
        }
        input{
            padding:15px;
            width:300px;
        }
        .start{
            background:red;
            color:white;
            border:none;
            padding:15px 25px;
            font-size:18px;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="navbar">
            <div class="logo">NETFLIX</div>
            <button class="signin">Sign In</button>
        </div>
        <div class="content">
            <h1>Unlimited Movies,<br>Shows and More</h1>
            <h3>Starts at ₹149. Cancel anytime.</h3>
            <p>Ready to watch? Enter your email.</p>
            <br>
            <input type="email" placeholder="Email Address">
            <button class="start">Get Started ></button>
        </div>
    </div>
</body>
</html>
