<html>
<head>
<style>
body{
    background:#f0f0f0;
}
.shape{
    display:inline-block;
    margin:20px;
    text-align:center;
    color:white;
}
.leaf{
    width:150px;
    height:150px;
    background:lightgreen;
    border-radius:0 100% 0 100%;
}
.halfoval{
    width:300px;
    height:150px;
    background:steelblue;
    border-radius:0 0 150px 150px;
}
.oval{
    width:300px;
    height:150px;
    background:lightgray;
    border-radius:50%;
    color:black;
}
.twist{
    width:300px;
    height:150px;
    background:teal;
    border-radius:100% 0 100% 0;
}
.twist2{
    width:300px;
    height:150px;
    background:slategray;
    border-radius:100px 0 100px 0;
}
.circle{
    width:150px;
    height:150px;
    background:skyblue;
    border-radius:50%;
}
.tab{
    width:150px;
    height:150px;
    background:lightcoral;
    border-radius:0 0 75px 75px;
}
.threesided{
    width:150px;
    height:150px;
    background:dimgray;
    border-radius:0 75px 75px 75px;
}
</style>
</head>
<body>
<div class="shape leaf"><h3>Leaf</h3></div>
<div class="shape halfoval"><h3>Half Oval</h3></div>
<div class="shape oval"><h3>Oval</h3></div>
<div class="shape twist"><h3>Twist</h3></div>
<br>
<div class="shape twist2"><h3>Twist Two</h3></div>
<div class="shape circle"><h3>Circle</h3></div>
<div class="shape tab"><h3>Tab</h3></div>
<div class="shape threesided"><h3>Three Sided</h3></div>
</body>
</html>
