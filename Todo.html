<!DOCTYPE html>
<html>
<head>
    <title>Simple To-Do App</title>
</head> 
<body>

    <h1>To Do App</h1>

    <input type="text" id="todo" placeholder="Enter a Task">
    <button onclick="addTodo()">Add</button>

    <ul id="todolist"></ul>

    <script>
        let arr = [];

        function addTodo() {
            let task = document.getElementById("todo").value;

            if (task == "") {
                alert("Enter a task");
                return;
            }

            arr.push(task);
            document.getElementById("todo").value = "";
            renderTodo();
        }

        function deleteTodo(index) {
            arr.splice(index, 1);
            renderTodo();
        }

        function updateTodo(index) {
            let newTask = prompt("Update Task:", arr[index]);

            if (newTask != null && newTask != "") {
                arr[index] = newTask;
                renderTodo();
            }
        }

        function renderTodo() {
            let list = document.getElementById("todolist");
            list.innerHTML = "";

            arr.forEach((task, index) => {
                list.innerHTML += `
                    <li>
                        ${task}
                        <button onclick="deleteTodo(${index})">Delete</button>
                        <button onclick="updateTodo(${index})">Update</button>
                    </li>
                `;
            });
        }
    </script>

</body>
</html>
