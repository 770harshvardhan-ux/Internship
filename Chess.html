<!DOCTYPE html>
<html>
<head>
<style>
.board{
    width: 400px;
    height: 400px;
    position: relative;
    border: 2px solid black;
}

.box{
    width: 50px;
    height: 50px;
    position: absolute;
}

.black{
    background-color: black;
}

.white{
    background-color: white;
}
</style>
</head>
<body>

<div class="board">

    <!-- Row 1 -->
    <div class="box white" style="top:0;left:0;"></div>
    <div class="box black" style="top:0;left:50px;"></div>
    <div class="box white" style="top:0;left:100px;"></div>
    <div class="box black" style="top:0;left:150px;"></div>
    <div class="box white" style="top:0;left:200px;"></div>
    <div class="box black" style="top:0;left:250px;"></div>
    <div class="box white" style="top:0;left:300px;"></div>
    <div class="box black" style="top:0;left:350px;"></div>

    <!-- Row 2 -->
    <div class="box black" style="top:50px;left:0;"></div>
    <div class="box white" style="top:50px;left:50px;"></div>
    <div class="box black" style="top:50px;left:100px;"></div>
    <div class="box white" style="top:50px;left:150px;"></div>
    <div class="box black" style="top:50px;left:200px;"></div>
    <div class="box white" style="top:50px;left:250px;"></div>
    <div class="box black" style="top:50px;left:300px;"></div>
    <div class="box white" style="top:50px;left:350px;"></div>

    <!-- Continue same pattern for rows 3 to 8 -->
    <div class="box white" style="top:100px;left:0;"></div>
    <div class="box black" style="top:100px;left:50px;"></div>
    <div class="box white" style="top:100px;left:100px;"></div>
    <div class="box black" style="top:100px;left:150px;"></div>
    <div class="box white" style="top:100px;left:200px;"></div>
    <div class="box black" style="top:100px;left:250px;"></div>
    <div class="box white" style="top:100px;left:300px;"></div>
    <div class="box black" style="top:100px;left:350px;"></div>

    <div class="box black" style="top:150px;left:0;"></div>
    <div class="box white" style="top:150px;left:50px;"></div>
    <div class="box black" style="top:150px;left:100px;"></div>
    <div class="box white" style="top:150px;left:150px;"></div>
    <div class="box black" style="top:150px;left:200px;"></div>
    <div class="box white" style="top:150px;left:250px;"></div>
    <div class="box black" style="top:150px;left:300px;"></div>
    <div class="box white" style="top:150px;left:350px;"></div>

</div>

</body>
</html>
